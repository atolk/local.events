# Copy to your server (e.g. /opt/local-events/docker-compose.yml) and adjust.
# The GitHub Actions deploy job sets IMAGE to ghcr.io/<owner>/<repo>:sha-<full-git-sha>.
# Rename to docker-compose.yml or pass the path via repo variable DEPLOY_COMPOSE_PATH.

services:
  app:
    image: ${IMAGE}
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    # Optional: healthcheck once you define one in the image
    # healthcheck:
    #   test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
    #   interval: 30s
    #   timeout: 5s
    #   retries: 3
